<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Tickets</title>
</head>
<body>
<header>
    <h1>My Tickets</h1>
</header>
<main>
    <ul>
        <li><a th:href="@{/upload}">Upload image</a></li>
    </ul>

    <section>
        <h2>Create New Ticket</h2>
        <form id="createForm">
            <label>Title: <input type="text" id="createTitle" required></label><br>
            <label>Description: <textarea id="createDescription"></textarea></label><br>
            <button type="submit">Create</button>
        </form>
    </section>

    <section>
        <h2>My Tickets</h2>
        <div id="ticketList"></div>
    </section>

    <section id="editSection" style="display:none;">
        <h2>Edit Ticket</h2>
        <form id="editForm">
            <input type="hidden" id="editId">
            <label>Title: <input type="text" id="editTitle" required></label><br>
            <label>Description: <textarea id="editDescription"></textarea></label><br>
            <button type="submit">Save</button>
            <button type="button" onclick="document.getElementById('editSection').style.display='none'">Cancel</button>
        </form>
    </section>
</main>

<script>
    const token = localStorage.getItem('jwt');

    async function loadTickets() {
        const res = await fetch('/tickets/my', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const tickets = await res.json();
        const list = document.getElementById('ticketList');
        list.innerHTML = '';
        tickets.forEach(t => {
            list.innerHTML += `
                <div>
                    <strong>${t.title}</strong> — ${t.status}<br>
                    <em>${t.description || ''}</em><br>
                    <button onclick="startEdit(${t.id}, '${t.title}', '${t.description || ''}')">Edit</button>
                    <hr>
                </div>`;
        });
    }

    document.getElementById('createForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await fetch('/tickets', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                title: document.getElementById('createTitle').value,
                description: document.getElementById('createDescription').value
            })
        });
        document.getElementById('createTitle').value = '';
        document.getElementById('createDescription').value = '';
        loadTickets();
    });

    function startEdit(id, title, description) {
        document.getElementById('editId').value = id;
        document.getElementById('editTitle').value = title;
        document.getElementById('editDescription').value = description;
        document.getElementById('editSection').style.display = 'block';
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        await fetch('/tickets/' + id, {
            method: 'PUT',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                title: document.getElementById('editTitle').value,
                description: document.getElementById('editDescription').value
            })
        });
        document.getElementById('editSection').style.display = 'none';
        loadTickets();
    });

    loadTickets();
</script>
</body>
</html>
