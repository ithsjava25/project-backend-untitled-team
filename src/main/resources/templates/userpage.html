<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Tickets</title>
</head>
<body>
<header>
    <h1>My Tickets</h1>
</header>
<main>
    <ul>
        <li><a th:href="@{/upload}">Upload image</a></li>
        <li><a th:href="@{/tickets/create}">Create new ticket</a></li>
    </ul>

    <section>
        <h2>My Tickets</h2>
        <div th:if="${#lists.isEmpty(tickets)}">
            <p>You have no tickets yet.</p>
        </div>
        <div th:each="ticket : ${tickets}">
            <strong th:text="${ticket.title}"></strong>
            <span th:text="' — ' + ${ticket.status}"></span>
            <br>
            <em th:text="${ticket.description}"></em>
            <br>
            <a th:href="@{/tickets/{id}/edit(id=${ticket.id})}">Edit</a>
            <hr>
        </div>
    </section>
</main>

</body>
</html>
