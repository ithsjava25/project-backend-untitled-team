<!DOCTYPE html>
<html xmlns_th="https://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Ticket</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<h1>Create Ticket</h1>
<div>
    <form th:action="@{/create}" th:object="${ticketForm}" method="post">
        <header class="ticket-header">
            <div class="ticket-title">
                <label for="title">Issue:</label>
                <input th:field="*{title}" id="title">
            </div>
        </header>
        <div class="ticket-body">
            <label for="description">Description:</label>
            <textarea th:field="*{description}" id="description"></textarea>
        </div>
        <footer class="ticket-footer">
            <div class="ticket-button">
                <button type="submit">Create Ticket</button>
            </div>
        </footer>
    </form>
</div>
</body>
</html>
