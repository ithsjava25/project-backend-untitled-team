spring.application.name=untitled
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=1800000
spring.devtools.livereload.enabled=true
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.docker.compose.lifecycle-management=start_only
spring.datasource.url=jdbc:postgresql://localhost:5432/IssueHandlingSystem
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
s3.endpoint=http://127.0.0.1:3900
s3.region=garage
s3.access-key=${S3_ACCESSKEY}
s3.secret-key=${S3_SECRETKEY}
logging.level.software.amazon.awssdk.request=DEBUG
logging.level.software.amazon.awssdk.auth.signing=DEBUG
